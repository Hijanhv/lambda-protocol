name: tests

# Runs the Foundry suite on every push and PR. The live-fork tests
# (contracts/test/fork/*) self-skip when no RPC env is set, so CI stays
# green and offline while still compiling those code paths.

on:
  push:
  pull_request:

jobs:
  forge:
    name: forge build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show versions
        run: forge --version

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv
