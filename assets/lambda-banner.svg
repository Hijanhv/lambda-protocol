<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none" role="img" aria-label="Lambda — Yield-Protected Liquidity for Uniswap v4">
  <defs>
    <!-- cream paper background with a faint pink wash bottom-right -->
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAF8F2"/>
      <stop offset="1" stop-color="#F4EFE5"/>
    </linearGradient>
    <radialGradient id="pinkWash" cx="0.82" cy="0.32" r="0.55">
      <stop offset="0" stop-color="#B5276F" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#B5276F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldWash" cx="0.14" cy="0.55" r="0.34">
      <stop offset="0" stop-color="#D6A23F" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#D6A23F" stop-opacity="0"/>
    </radialGradient>

    <!-- lambda mark gradient: deep rose → bright pink -->
    <linearGradient id="lam" x1="80" y1="250" x2="240" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#931E5A"/>
      <stop offset="0.55" stop-color="#B5276F"/>
      <stop offset="1" stop-color="#D24B92"/>
    </linearGradient>

    <!-- ink wordmark gradient (subtle vertical falloff) -->
    <linearGradient id="word" x1="300" y1="120" x2="300" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#191710"/>
      <stop offset="1" stop-color="#403D33"/>
    </linearGradient>

    <!-- the two curves: LVR (drag, descending) and Yield (recovered, ascending) -->
    <linearGradient id="lvrLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B4452F" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#B4452F" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="yieldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B5276F" stop-opacity="0"/>
      <stop offset="1" stop-color="#B5276F" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- paper + washes -->
  <rect width="1200" height="320" fill="url(#paper)"/>
  <rect width="1200" height="320" fill="url(#goldWash)"/>
  <rect width="1200" height="320" fill="url(#pinkWash)"/>

  <!-- editorial vertical grid (very faint ink) -->
  <g stroke="#211D14" stroke-opacity="0.045" stroke-width="1">
    <path d="M120 0V320M240 0V320M360 0V320M480 0V320M600 0V320M720 0V320M840 0V320M960 0V320M1080 0V320"/>
  </g>

  <!-- hairline edge top + bottom (matches the landing's bordered rhythm) -->
  <rect x="0.5" y="0.5" width="1199" height="319" stroke="#211D14" stroke-opacity="0.55" stroke-width="1" fill="none"/>

  <!-- "loss → yield" curve story across the bottom band -->
  <!-- LVR drag: descending, low-opacity rose, fading to the right -->
  <path d="M60 220 C 240 246 380 270 540 296" stroke="url(#lvrLine)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Funding yield: ascending, gaining strength toward the right -->
  <path d="M540 296 C 720 286 880 200 1160 110" stroke="url(#yieldLine)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- crossover marker where loss becomes yield -->
  <circle cx="540" cy="296" r="3.5" fill="#B5276F"/>
  <circle cx="540" cy="296" r="9" fill="#B5276F" fill-opacity="0.12"/>

  <!-- end-of-yield marker (top right) -->
  <circle cx="1160" cy="110" r="4" fill="#B5276F"/>

  <!-- lambda mark, scaled and positioned at the left -->
  <g transform="translate(78 70) scale(1.78)" stroke="url(#lam)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 84 L60 14"/>
    <path d="M46 40 L84 84"/>
  </g>

  <!-- wordmark + tagline (serif for the wordmark, sans for support) -->
  <text x="300" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" letter-spacing="2" fill="url(#word)">LAMBDA</text>
  <text x="304" y="214" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="0.8" fill="#403D33">Yield-Protected Liquidity for Uniswap v4</text>
  <text x="304" y="248" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" letter-spacing="0.4" fill="#6C6A5F">Real cross-chain delta hedging  ·  Uniswap v4  ×  Reactive Network  ×  Hyperliquid</text>

  <!-- "loss → yield" caption near the crossover, ink-soft -->
  <text x="546" y="282" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="1.6" fill="#403D33" text-transform="uppercase">LOSS</text>
  <text x="1148" y="98" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="1.6" fill="#B5276F" text-transform="uppercase">YIELD</text>

  <!-- formula watermark, right side, italic serif -->
  <text x="1148" y="152" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="30" fill="#B5276F" fill-opacity="0.78">&#955;/V = &#963;&#178; &#8260; 8</text>
  <text x="1148" y="184" text-anchor="end" font-family="'SF Mono', 'DejaVu Sans Mono', monospace" font-size="13" fill="#6C6A5F">loss &#8594; funding yield</text>

  <!-- small UHI9 tag, bottom-right -->
  <g transform="translate(1148 296)">
    <rect x="-92" y="-18" width="92" height="20" rx="10" fill="#FFFFFF" stroke="#211D14" stroke-opacity="0.25"/>
    <text x="-46" y="-4" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.6" fill="#403D33">UHI9 · HK-0872</text>
  </g>
</svg>
