[profile.default]
src = "contracts/src"
test = "contracts/test"
script = "contracts/script"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
remappings = [
    "forge-std/=lib/forge-std/src/",
    "solady/=lib/solady/src/",
    "v4-core/=lib/v4-core/",
]

[fuzz]
runs = 512
max_test_rejects = 200000

[lint]
# We intentionally follow Uniswap's Q64.96 naming convention (sqrtPriceAX96,
# sqrtPriceBX96) so the math reads identically to v4-core. Silence the casing note.
exclude_lints = ["mixed-case-variable"]
